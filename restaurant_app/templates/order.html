{% extends "layout.html" %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto; padding: 30px; border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    
    <h2 style="color: #c5a059; text-align: center; margin-bottom: 20px;">Checkout Details</h2>
    
    <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        <p style="margin: 5px 0;"><strong>Item:</strong> {{ item_name }}</p>
        <p style="margin: 5px 0;"><strong>Restaurant:</strong> {{ res_name }}</p>
    </div>

    <!-- UPDATE: Action matrum Method add panniullom -->
    <form action="{{ url_for('confirm_order') }}" method="POST">
        <!-- Hidden inputs to pass item and restaurant name to backend -->
        <input type="hidden" name="item_name" value="{{ item_name }}">
        <input type="hidden" name="res_name" value="{{ res_name }}">
        
        <!-- Quantity -->
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Quantity:</label>
            <!-- UPDATE: name="quantity" add panniullom -->
            <input type="number" name="quantity" min="1" value="1" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;" required>
        </div>

        <!-- Delivery Address -->
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Delivery Address:</label>
            <!-- UPDATE: name="address" add panniullom -->
            <textarea name="address" rows="3" placeholder="Enter your full address..." style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; resize: none;" required></textarea>
        </div>

        <!-- Payment Method -->
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Payment Method:</label>
            <!-- UPDATE: name="payment" add panniullom -->
            <select name="payment" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <option value="Cash on Delivery (COD)">Cash on Delivery (COD)</option>
                <option value="UPI / GPay / PhonePe">UPI / GPay / PhonePe</option>
                <option value="Credit / Debit Card">Credit / Debit Card</option>
            </select>
        </div>

        <!-- Submit Button -->
        <button type="submit" style="width: 100%; background: #c5a059; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer;">
            Confirm Order
        </button>
        
    </form>

    <p style="text-align: center; margin-top: 15px;"><a href="{{ url_for('menu') }}" style="color: #666; text-decoration: none;">Cancel Order</a></p>
</div>
{% endblock %}
