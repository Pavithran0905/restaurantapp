{% extends "layout.html" %}

{% block content %}


<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap');

    .admin-container {
        --theme-red: #D32F2F;
        --theme-orange: #FF6D00;
        --theme-white: #FFFFFF;
        --theme-border: #E2E8F0;
        --theme-dark: #1E293B;

        max-width: 1000px;
        margin: 2.5rem auto;
        padding: 0 1.5rem;
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--theme-dark);
    }

    /* Minimalist Header */
    .admin-header-compact {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 1.5rem;
        border-bottom: 2px solid var(--theme-border);
        margin-bottom: 2rem;
    }

    .admin-header-compact h1 {
        font-size: 1.6rem;
        font-weight: 800;
        color: var(--theme-red);
    }

    .live-dot {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        font-weight: 700;
        color: #10B981;
    }

    .live-dot::before {
        content: '';
        width: 8px;
        height: 8px;
        background-color: #10B981;
        border-radius: 50%;
    }

    /* Compact Counter Row */
    .counters-row {
        display: flex;
        gap: 1.5rem;
        margin-bottom: 2rem;
    }

    .counter-pill {
        background: var(--theme-white);
        border: 1px solid var(--theme-border);
        padding: 0.75rem 1.2rem;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.95rem;
        font-weight: 600;
    }

    .counter-pill span {
        color: var(--theme-orange);
        font-weight: 800;
    }

    /* Grid Panel Actions */
    .management-grid-box {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 1.25rem;
    }

    .nav-panel-card {
        background: var(--theme-white);
        border: 1px solid var(--theme-border);
        border-radius: 10px;
        padding: 1.5rem;
        text-decoration: none;
        color: inherit;
        font-weight: 700;
        font-size: 1.1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.2s ease;
    }

    .nav-panel-card .card-arrow {
        color: var(--theme-orange);
        font-size: 1.2rem;
        transition: transform 0.2s ease;
    }

    /* Clean Hover Effects */
    .nav-panel-card:hover {
        border-color: var(--theme-red);
        background-color: rgba(211, 47, 47, 0.02);
    }

    .nav-panel-card:hover .card-arrow {
        transform: translateX(4px);
        color: var(--theme-red);
    }
</style>

<div class="admin-container">

    <!-- Header Block -->
    <header class="admin-header-compact">
        <h1>Kitchen Console</h1>
        <div class="live-dot">Live</div>
    </header>

    <!-- Overview Counters -->
    <div class="counters-row">
        <div class="counter-pill">
            Outlets: <span>{{ stats.restaurants_data_count }}</span>
        </div>
        <div class="counter-pill">
            Menu Items: <span>{{ stats.menu_items_count }}</span>
        </div>
    </div>

    <!-- Core Directories -->
    <div class="management-grid-box">
        <a href="/admin/reservations" class="nav-panel-card">
            <span>Table Reservations</span>
            <span class="card-arrow">→</span>
        </a>
        
        <a href="/admin/orders" class="nav-panel-card">
            <span>Orders & Invoices</span>
            <span class="card-arrow">→</span>
        </a>
        
        <a href="/menu" class="nav-panel-card">
            <span>Menu Inventory</span>
            <span class="card-arrow">→</span>
        </a>
    </div>

</div>
{% endblock %}
