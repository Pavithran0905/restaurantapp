{% extends "layout.html" %}

{% block content %}
<h1 style="text-align: center; color: #c5a059; margin-top: 30px;">Restaurants serving {{ item.name }}</h1>

<div class="restaurant-list" style="max-width: 800px; margin: 0 auto; padding: 20px;">
    {% for res in restaurants %}
    <div style="border: 1px solid #ddd; padding: 20px; margin-bottom: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <div>
            <h2 style="margin: 0;">{{ res.name }}</h2>
            <p style="margin: 5px 0;">Rating: <span style="background: green; color: white; padding: 2px 6px; border-radius: 4px;">{{ res.rating }} ★</span></p>
            <p style="color: #666;">Delivery Time: {{ res.time }}</p>
        </div>
        
        <!-- BUTTON-AI LINK-AH MATHIULLOM: Item name matrum Restaurant name-ai anupuroam -->
        <a href="{{ url_for('place_order', item_name=item.name, res_name=res.name) }}" 
           style="background: #c5a059; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-weight: bold;">
           Order Now
        </a>
    </div>
    {% endfor %}
</div>

<p style="text-align: center;"><a href="{{ url_for('menu') }}">Back to Menu</a></p>
{% endblock %}
